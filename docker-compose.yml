# ==================== SOLDIA v2.0 - Docker Compose ====================

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: soldia_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-soldia_db}
      POSTGRES_USER: ${POSTGRES_USER:-soldia_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_this_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-soldia_user} -d ${POSTGRES_DB:-soldia_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - soldia_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: soldia_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-change_this_password} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-change_this_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - soldia_network

  # SOLDIA API
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: soldia_web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-soldia_user}:${POSTGRES_PASSWORD:-change_this_password}@postgres:5432/${POSTGRES_DB:-soldia_db}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-change_this_password}@redis:6379/0
      # CRIT-B FIX: RATE_LIMIT_STORAGE must use docker service name 'redis', not 'localhost'.
      # Default in settings.py is redis://localhost:6379/1 — unreachable inside Docker.
      # Without this override, slowapi silently disables rate limiting on all endpoints.
      - RATE_LIMIT_STORAGE=redis://:${REDIS_PASSWORD:-change_this_password}@redis:6379/1
      - ENVIRONMENT=production
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - soldia_network

  # Celery Worker (для фоновых задач)
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: soldia_celery_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-soldia_user}:${POSTGRES_PASSWORD:-change_this_password}@postgres:5432/${POSTGRES_DB:-soldia_db}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-change_this_password}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-change_this_password}@redis:6379/2
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-change_this_password}@redis:6379/3
    command: celery -A tasks.worker worker --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - soldia_network

  # Celery Beat (для периодических задач)
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: soldia_celery_beat
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-soldia_user}:${POSTGRES_PASSWORD:-change_this_password}@postgres:5432/${POSTGRES_DB:-soldia_db}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-change_this_password}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-change_this_password}@redis:6379/2
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-change_this_password}@redis:6379/3
    command: celery -A tasks.worker beat --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - soldia_network

  # Flower (Celery monitoring)
  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: soldia_flower
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-change_this_password}@redis:6379/2
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-change_this_password}@redis:6379/3
    command: celery -A tasks.worker flower --port=5555 --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-change_this_flower_password}
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy
      celery_worker:
        condition: service_started
    networks:
      - soldia_network

  # INFO-3 FIX: Run Alembic migrations once before the app starts.
  # alembic.ini hardcodes localhost — this service injects the correct
  # DATABASE_URL so migrations work inside Docker without manual intervention.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: soldia_migrate
    restart: "no"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-soldia_user}:${POSTGRES_PASSWORD:-change_this_password}@postgres:5432/${POSTGRES_DB:-soldia_db}
    command: ["sh", "-c", "alembic upgrade head"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - soldia_network

  # Nginx (Reverse Proxy)
  nginx:
    image: nginx:alpine
    container_name: soldia_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./static:/usr/share/nginx/html:ro
    depends_on:
      - web
    networks:
      - soldia_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  soldia_network:
    driver: bridge
